<footer class="bg-dark text-white pt-4 pb-2 mt-5">
    <div class="container text-center text-md-start">
        <div class="row">
            
            <div class="col-md-4">
                <h5 class="text-uppercase mb-4 font-weight-bold">FarmaStock</h5>
                <p><i class="bi bi-geo-alt me-2"></i>{{ info.sucursal }}</p>
                <p><i class="bi bi-envelope me-2"></i>{{ info.email }}</p>
            </div>

            <div class="col-md-4 text-center">
                <h5 class="text-uppercase mb-4 font-weight-bold">Seguinos</h5>
                @for (red of info.redes; track red.nombre) {
                    <a [href]="red.url" class="text-white me-3 text-decoration-none" target="_blank">
                        <i class="bi" [ngClass]="red.icono"></i> {{ red.nombre }}
                    </a>
                }
            </div>

            <div class="col-md-4 text-end">
                <p class="mt-3">
                    &copy; {{ anioActual }} FarmaStock. Todos los derechos reservados.
                </p>
            </div>

        </div>
    </div>
</footer>
