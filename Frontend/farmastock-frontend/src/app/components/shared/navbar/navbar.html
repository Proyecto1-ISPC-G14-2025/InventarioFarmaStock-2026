<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">
    <a class="navbar-brand" routerLink="/"> {{ infoService.globalInfo.nombreFarmacia }} </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        @for (item of menuItems; track item.label) {
            <li class="nav-item">
            <a class="nav-link" 
                [routerLink]="item.path" 
                routerLinkActive="active"
                [routerLinkActiveOptions]="{exact: item.path === ''}">
                {{ item.label }}
            </a>
            </li>
        }
        </ul>

        <div class="d-flex align-items-center">
        @if (estaLogueado) {
            <span class="text-white-50 me-3 small">Bienvenido/a</span>
            <button class="btn btn-sm btn-outline-light">Cerrar Sesión</button>
        } @else {
            <button class="btn btn-sm btn-primary" routerLink="/login">Ingresar</button>
        }
        </div>
    </div>
    </div>
</nav>
