<!-- Login NO CAMBIAR FORMULARIO REACTIVO -NCALMUCCI-->
<div class="login-container">
  <div class="login-card" [class.shake-animation]="shaking">
    <h3 class="text-center mb-4">Ingreso al Sistema</h3>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" formControlName="email"
          [class.is-invalid]="(email?.touched || loginError) && email?.invalid">
        <div class="text-danger mt-1" *ngIf="email?.touched && email?.invalid">
          <small *ngIf="email?.errors?.['required']">El correo es obligatorio.</small>
          <small *ngIf="email?.errors?.['email']">Formato de correo inválido.</small>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" formControlName="password"
          [class.is-invalid]="(password?.touched || loginError) && password?.invalid">
        <div class="text-danger mt-1" *ngIf="password?.touched && password?.invalid">
          <small *ngIf="password?.errors?.['required']">La contraseña es obligatoria.</small>
          <small *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres.</small>
          <small *ngIf="password?.errors?.['maxlength']">Máximo 20 caracteres.</small>
        </div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">
          Ingresar
        </button>
      </div>

      <div class="error-message" [style.display]="loginError ? 'block' : 'none'">
        Credenciales incorrectas. Por favor, intente de nuevo.
      </div>
    </form>
  </div>
</div>
