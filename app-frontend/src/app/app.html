<div class="index-page">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container">
    <a class="navbar-brand">FarmaStock</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#inicio">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="#acerca">Acerca</a></li>
        <li class="nav-item"><a class="nav-link" href="#galeria">Galería</a></li>
        <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section id="inicio" class="py-5 text-center bg-light">
  <div class="container">
    <h1 class="mt-5">Bienvenido a FarmaStock</h1>
    <p>Gestión de inventario de medicamentos</p>

    
    <img src="img/banner.jpg" class="img-fluid rounded">
  </div>
</section>

<!-- Acerca -->
<section id="acerca" class="py-5 text-center">
  <div class="container">
    <h2>Acerca</h2>
    <img src="img/FarmaTablet.jpg" class="img-fluid rounded">
  </div>
</section>

<!-- FarmaStock -->
<section class="py-5 text-center">
  <div class="container">
    <img src="img/admin.jpg" class="img-fluid rounded">

    <div class="mt-3">
      <a class="btn btn-primary btn-lg">DESCARGAR</a>
    </div>
  </div>
</section>

<!-- GALERÍA -->
<section id="galeria" class="py-5 bg-light text-center">
  <div class="container">

    <h2 class="mb-4">Galería</h2>

    <button class="btn btn-outline-primary me-2" (click)="moveCarousel(-1)">❮</button>
    <button class="btn btn-outline-primary" (click)="moveCarousel(1)">❯</button>

    <!-- Slides -->
    <div class="mt-4">
      <div *ngIf="currentSlide === 0">
        <img src="img/LogoFarmaStock.png" width="200">
      </div>

      <div *ngIf="currentSlide === 1">
        <img src="img/SoftwareActivos.png" width="200">
      </div>

      <div *ngIf="currentSlide === 2">
        <img src="img/SoftwareInventario.png" width="200">
      </div>
    </div>

    <!-- Dots -->
    <div class="mt-3">
      <span class="mx-2" (click)="goToSlide(0)">●</span>
      <span class="mx-2" (click)="goToSlide(1)">●</span>
      <span class="mx-2" (click)="goToSlide(2)">●</span>
    </div>

  </div>
</section>

<!-- Contacto -->
<section id="contacto" class="py-5 text-center">
  <div class="container">
    <h2>Contacto</h2>
    <button class="btn btn-primary">Enviar</button>
  </div>
</section>

<!-- Footer -->
<footer class="text-center p-3 bg-dark text-white">
  <p>© 2025 FarmaStock</p>
</footer>

</div>
